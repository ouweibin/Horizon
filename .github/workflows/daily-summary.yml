name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 08:00 Asia/Shanghai (00:00 UTC)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

# 这一步会在 Horizon 运行成功后，读取它刚刚生成的 md 文件并直发钉钉
      - name: Send Summary to DingTalk
        if: success()
        run: |
          # 1. 找到最新生成的本地中文早报文件路径
          REPORT_FILE=$(ls data/summaries/*-zh.md | tail -n 1)
          
          # 2. 读取文件内容并做 JSON 安全转义（防止 markdown 的换行符导致 JSON 报错）
          SUMMARY_CONTENT=$(cat "$REPORT_FILE" | jq -s -R .)
          
          # 3. 组装钉钉绝对能识别的标准报文（最外层硬编码 msgtype）
          JSON_BODY=$(cat <<EOF
          {
            "msgtype": "markdown",
            "markdown": {
              "title": "Briefing",
              "text": "### Briefing - Horizon AI新闻早报\n\n"
            }
          }
          EOF
          )
          
          # 4. 用 jq 将新闻内容合并进钉钉报文中
          FINAL_JSON=$(echo "$JSON_BODY" | jq --argjson content "$SUMMARY_CONTENT" '.markdown.text += $content')
          
          # 5. 绕过软件，直接用 Linux 的 curl 扔给钉钉
          curl -X POST "${{ secrets.HORIZON_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$FINAL_JSON"

